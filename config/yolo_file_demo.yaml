/**:
  ros__parameters:
    input_mode: "file"
    image_file: "/path/to/input.jpg"
    output_image_file: "/tmp/yolo_out.jpg"
    enable_profile: true

    preprocess:
      letterbox: true
      letterbox_color: [114, 114, 114]
      auto_input_size: true

    postprocess:
      confidence_threshold: 0.25
      nms_threshold: 0.45
      max_detections: 300
